```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 分数バトルゲーム（約分対応）</title>

<style>
body{
    font-family:sans-serif;
    max-width:700px;
    margin:30px auto;
    padding:20px;
}

h1{
    text-align:center;
}

.question{
    font-size:32px;
    font-weight:bold;
    margin:20px 0;
}

input{
    padding:10px;
    font-size:18px;
    width:250px;
}

button{
    padding:10px 15px;
    font-size:16px;
    margin:5px;
    cursor:pointer;
}

.success{
    color:green;
    font-weight:bold;
}

.error{
    color:red;
    font-weight:bold;
}

.stats{
    margin-top:20px;
    font-size:20px;
}
</style>
</head>
<body>

<h1>🎮 分数バトルゲーム（約分対応）</h1>

<label>モードを選んでね：</label>
<select id="mode">
    <option>かけ算</option>
    <option>わり算</option>
    <option>分数かけ算</option>
    <option>分数わり算</option>
</select>

<h2>🧠 問題</h2>

<div class="question" id="question"></div>

<p>✏️ 例：3/4 や -6/12（自動で約分されるよ）</p>

<input id="answer" placeholder="答えを入力（分数OK）">

<br><br>

<button onclick="checkAnswer()">答え合わせ</button>
<button onclick="nextProblem()">次の問題</button>

<p id="result"></p>

<hr>

<div class="stats">
    <div>🏆 スコア: <span id="score">0</span></div>
    <div>🔥 コンボ: <span id="combo">0</span></div>
    <div>⭐ ベストコンボ: <span id="bestCombo">0</span></div>
</div>

<script>

const MIN = -10;
const MAX = 10;

let score = 0;
let combo = 0;
let bestCombo = 0;

let currentAnswer = null;

function gcd(a,b){
    a=Math.abs(a);
    b=Math.abs(b);

    while(b!==0){
        [a,b]=[b,a%b];
    }
    return a;
}

function simplify(n,d){

    if(d<0){
        n=-n;
        d=-d;
    }

    const g=gcd(n,d);

    return {
        num:n/g,
        den:d/g
    };
}

function equalFraction(a,b){
    return a.num===b.num && a.den===b.den;
}

function randInt(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

function randNonZero(){
    let n=0;

    while(n===0){
        n=randInt(MIN,MAX);
    }

    return n;
}

function makeFraction(){
    return simplify(
        randInt(MIN,MAX),
        randNonZero()
    );
}

function fractionToString(f){

    if(f.den===1){
        return String(f.num);
    }

    return `${f.num}/${f.den}`;
}

function multiply(a,b){
    return simplify(
        a.num*b.num,
        a.den*b.den
    );
}

function divide(a,b){
    return simplify(
        a.num*b.den,
        a.den*b.num
    );
}

function generateProblem(){

    const mode=document.getElementById("mode").value;

    let q="";
    let ans=null;

    if(mode==="かけ算"){

        const a=randInt(MIN,MAX);
        const b=randInt(MIN,MAX);

        q=`${a} × ${b}`;

        ans=simplify(a*b,1);
    }

    else if(mode==="わり算"){

        const b=randNonZero();

        const result=randInt(MIN,MAX);

        const a=result*b;

        q=`${a} ÷ ${b}`;

        ans=simplify(result,1);
    }

    else if(mode==="分数かけ算"){

        const a=makeFraction();
        const b=makeFraction();

        q=`(${fractionToString(a)}) × (${fractionToString(b)})`;

        ans=multiply(a,b);
    }

    else if(mode==="分数わり算"){

        const a=makeFraction();
        const b=makeFraction();

        q=`(${fractionToString(a)}) ÷ (${fractionToString(b)})`;

        ans=divide(a,b);
    }

    currentAnswer=ans;

    document.getElementById("question").textContent=q;

    document.getElementById("answer").value="";

    document.getElementById("result").textContent="";
}

function parseFraction(text){

    text=text.trim();

    try{

        if(text.includes("/")){

            const parts=text.split("/");

            if(parts.length!==2) return null;

            const n=parseInt(parts[0]);
            const d=parseInt(parts[1]);

            if(d===0) return null;

            return simplify(n,d);
        }

        return simplify(parseInt(text),1);

    }catch{
        return null;
    }
}

function checkAnswer(){

    const input=document.getElementById("answer").value;

    const userAns=parseFraction(input);

    const result=document.getElementById("result");

    if(!userAns){

        result.className="error";
        result.textContent="入力が正しくないよ（例：3/4）";
        return;
    }

    if(equalFraction(userAns,currentAnswer)){

        result.className="success";
        result.textContent="正解！🎉";

        score++;
        combo++;

        if(combo>bestCombo){
            bestCombo=combo;
        }

    }else{

        result.className="error";
        result.textContent=
        `不正解！ 正解は ${fractionToString(currentAnswer)}`;

        combo=0;
    }

    updateStats();
}

function updateStats(){

    document.getElementById("score").textContent=score;
    document.getElementById("combo").textContent=combo;
    document.getElementById("bestCombo").textContent=bestCombo;
}

function nextProblem(){
    generateProblem();
}

document.getElementById("mode")
.addEventListener("change",generateProblem);

generateProblem();

</script>

</body>
</html>
```
